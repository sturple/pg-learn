  #   ports:
  #     - "38080:80"

  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #     - ./servers.json:/pgadmin4/servers.json

  #   depends_on:
  #     - postgres
volumes:
  postgres_data:
  pgadmin_data: